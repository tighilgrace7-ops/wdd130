<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | White Water Rafting</title>
    <link rel="stylesheet" href="styles/rafting.css">
    <meta name="description"
      content="Need help with rafting bookings or have questions about our water adventures? Contact the RaftNigeria team in Abuja today. Friendly support, quick replies, and expert guidance for your next river trip.">
    <meta name="author" content="Grace Tighil">
</head>

<body>
    <div class="body">
        <header class="header">
            <img src="images/z-wwr-oars.png"
              alt="Rafting adventure on a fast-moving river surrounded by cliffs">

            <nav class="nav">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="about.html">About Us</a></li>
                    <li><a href="trips.html">Trips</a></li>
                    <li><a href="contact.html">Contact Us</a></li>
                </ul>
            </nav>
        </header>

        <main>
            <div class="hero">

                <h1 class="h1">White Water Rafting Company</h1>

                <p>
                    123 Main River Street <br>
                    Kolob, California <br>
                    +1 999 999 9999 <br>
                    info@whitewater.com
                </p>

                <div class="map">
                    <iframe class="frame"
                      src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d1008658.774721421!2d7.4514432!3d9.0570752!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1"
                      loading="lazy">
                    </iframe>

                    <form action="#" method="post">
                        <label for="name">Name:</label>
                        <input class="field" type="text" id="name" name="name" required>

                        <label for="email">Email:</label>
                        <input class="field" type="email" id="email" name="email" required>

                        <p>Message Purpose:</p>
                        <input type="radio" name="purpose" value="general"> General Inquiry<br>
                        <input type="radio" name="purpose" value="reservation"> Reservation<br>
                        <input type="radio" name="purpose" value="suggestion"> Website
                        Suggestion<br>

                        <label for="message">Message:</label><br>
                        <textarea class="long" id="message" name="message"></textarea>

                        <button type="submit">Get in Touch!</button>
                    </form>
                </div>

            </div>

            <section class="all">
                <h2>We Are Here to Serve You</h2>

                <div class="adventure-gallery1">
                    <figure>
                        <img src="images/employee.jpg" alt="Employee">
                        <figcaption>River Guide</figcaption>
                    </figure>

                    <figure>
                        <img src="images/employee1.jpg" alt="Employee">
                        <figcaption>Safety Instructor</figcaption>
                    </figure>

                    <figure>
                        <img src="images/employee2.jpg" alt="Employee">
                        <figcaption>Tour Manager</figcaption>
                    </figure>
                </div>
            </section>
        </main>

        <footer>
            <p>© 2026 💦 White Water Rafting 💦 Grace Tighil</p>

            <nav class="socialmedia">
                <a href="https://facebook.com">
                    <img src="images/facebook.svg" alt="Facebook Icon">
                </a>
                <a href="https://linkedin.com">
                    <img src="images/linkedin.svg" alt="Linkedin Icon">
                </a>
                <a href="https://instagram.com">
                    <img src="images/instagram.svg" alt="Instagram Icon">
                </a>
            </nav>
        </footer>
    </div>


</body>

</html>
