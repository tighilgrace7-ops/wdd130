<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | White Water Rafting</title>
    <link rel="stylesheet" href="styles/rafting.css">
    <meta name="description"
      content="Contact Rafting water for rafting bookings and water adventure inquiries. Friendly team, fast replies, and expert guidance to plan your next river trip.">
    <meta name="author" content="Grace Tighil">
</head>

<body>
    <div class="body">
        <header class="header">
            <img src="images/z-wwr-oars.png"
              alt="Rafting adventure on a fast-moving river surrounded by cliffs">

            <nav class="nav">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="about.html">About Us</a></li>
                    <li><a href="trips.html">Trips</a></li>
                    <li><a href="contact.html">Contact Us</a></li>
                </ul>
            </nav>
        </header>

        <main>
            <div class="hero">

                <h1 class="h1">White Water Rafting Company</h1>
                <p>123 Main River Street <br> Kolob, California <br> +1 999 999 9999 <br>
                    info@whitewater.com</p>
                <div class="map">
                    <iframe class="frame"
                      src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d1008658.774721421!2d7.4514432!3d9.0570752!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sen!2sng!4v1775220972175!5m2!1sen!2sng"
                      allowfullscreen="" loading="lazy"
                      referrerpolicy="no-referrer-when-downgrade"></iframe>
                    <form action="#" method="post">

                        <!-- Name -->
                        <label for="name">Name:</label>
                        <input class="field" type="text" placeholder="amanda" id="name" name="name"
                          required><br><br>

                        <!-- Email -->
                        <label for="email">Email:</label>
                        <input class="field" type="email" placeholder="amanda@gmail.com" id="email"
                          name="email" required><br><br>

                        <!-- Message Purpose -->
                        <div class="msg">
                            <p>Message <br> Purpose:</p>
                            <div class="msg1">
                                <input class="radio" type="radio" id="general" name="purpose"
                                  value="General Inquiry">
                                <label for="general">General Inquiry</label><br>

                                <input class="radio" type="radio" id="reservation" name="purpose"
                                  value="Reservation">
                                <label for="reservation">Reservation</label><br>

                                <input class="radio" type="radio" id="suggestion" name="purpose"
                                  value="Website Suggestion">
                                <label for="suggestion">Website Suggestion</label><br><br>
                            </div>


                        </div>


                        <!-- Message -->
                        <label for="message">Message:</label><br>
                        <textarea class="long" id="message" placeholder="Type here" name="message"
                          rows="5" cols="40"></textarea><br><br>

                        <!-- Newsletter Checkbox -->
                        <input type="checkbox" id="subscribe" name="subscribe">
                        <label for="subscribe">Please subscribe me to the monthly
                            newsletter</label><br><br>

                        <!-- Submit Button -->
                        <button type="submit">Get in Touch!</button>

                    </form>
                </div>
                <div class="bottom">
                    <section class="all">
                        <h2>We Are Here to Serve You</h2>

                        <div class="adventure-gallery1">
                            <div class="image1">
                                <figure class="figure">
                                    <img src="images/employee.jpg" alt="Employee">
                                    <p> <b>RIVER GUIDE</b> </p>
                                    <figcaption>Fearless leader guiding <br>
                                        unforgettable river adventures</figcaption>
                                </figure>
                            </div>

                            <div class="image1">
                                <figure>
                                    <img src="images/employee1.jpg" alt="Employee">
                                    <p> <b>SAFETY INSTRUCTOR</b></p>
                                    <figcaption>Passionate expert ensuring <br>
                                        every guest stays safe</figcaption>
                                </figure>
                            </div>

                            <div class="image1">
                                <figure>
                                    <img src="images/employee2.jpg" alt="Employee">
                                    <p> <b>TOUR MANAGER</b></p>
                                    <figcaption>Dedicated planner creating <br> seamless
                                        exciting trip experiences</figcaption>
                                </figure>
                            </div>


                        </div>
                    </section>
                </div>
            </div>
        </main>

        <footer>
            <p>© 2026 💦 White Water Rafting 💦 Grace Tighil</p>

            <nav class="socialmedia">
                <a href="https://facebook.com">
                    <img src="images/facebook.svg" alt="Facebook Icon">
                </a>
                <a href="https://linkedin.com">
                    <img src="images/linkedin.svg" alt="Linkedin Icon">
                </a>
                <a href="https://instagram.com">
                    <img src="images/instagram.svg" alt="Instagram Icon">
                </a>
            </nav>
        </footer>
    </div>


</body>

</html>
